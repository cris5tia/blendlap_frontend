<router-outlet></router-outlet>
<app-toast></app-toast>
<app-barbero-presencial-modal></app-barbero-presencial-modal>

<!-- PWA Notifications Toast -->
<div class="app-pwa-toast" *ngIf="showInstallPrompt" [@slideInOut]>
  <div class="app-pwa-toast__content">
    <div class="app-pwa-toast__icon"><i class="fas fa-download"></i></div>
    <div class="app-pwa-toast__text">
      <p class="app-pwa-toast__title">Instalar Blendlap</p>
      <p class="app-pwa-toast__desc">Accede más rápido desde tu pantalla de inicio</p>
    </div>
  </div>
  <button type="button" class="app-pwa-toast__action app-pwa-toast__action--primary" (click)="installApp(); hideInstallPrompt()">
    Instalar
  </button>
  <button type="button" class="app-pwa-toast__close" (click)="hideInstallPrompt()" aria-label="Cerrar">
    <i class="fas fa-times"></i>
  </button>
</div>

<div class="app-pwa-toast" *ngIf="showNotificationPrompt" [@slideInOut]>
  <div class="app-pwa-toast__content">
    <div class="app-pwa-toast__icon app-pwa-toast__icon--bell"><i class="fas fa-bell"></i></div>
    <div class="app-pwa-toast__text">
      <p class="app-pwa-toast__title">Activar notificaciones</p>
      <p class="app-pwa-toast__desc">Recibe recordatorios de tus citas</p>
    </div>
  </div>
  <button type="button" class="app-pwa-toast__action app-pwa-toast__action--primary" (click)="enableNotifications()">
    Activar
  </button>
  <button type="button" class="app-pwa-toast__close" (click)="hideNotificationPrompt()" aria-label="Cerrar">
    <i class="fas fa-times"></i>
  </button>
</div>

<div class="app-logout-overlay" *ngIf="authService.logoutLoading$ | async">
  <div class="app-logout-card">
    <div class="app-logout-spinner">
      <i class="fas fa-spinner fa-spin"></i>
    </div>
    <p>Cerrando sesión...</p>
  </div>
</div>
